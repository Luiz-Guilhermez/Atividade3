<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <h2>Abertura de Chamado</h2>
        <label>Nome Completo:</label>
        <input type="text" id="input-nome" placeholder="Digite seu nome">

        <select name="nivel" id="nivel">
            <option value="">Urgência:</option>

            <option value="1">Baixa</option>
            <option value="2">Média</option>
            <option value="3">Alta</option>
        </select>

        <button onclick="gerarTicket()">Gerar ticket</button>
    </section>

    <section id="ticket-resultado" style="display: none;">
        <h3>Ticket Gerado!</h3>
        <p>Cliente: <strong id="out-nome"></strong></p>
        <p>Data de Abertura: <time id="out-data"></time></p>
        <p>Prazo de Resposta: <mark id="out-prazo"></mark></p>
    </section>
</body>
</html>
